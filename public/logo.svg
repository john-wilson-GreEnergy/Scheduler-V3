<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Hexagon Outline -->
  <polygon points="100,10 182,55 182,145 100,190 18,145 18,55" fill="none" stroke="#40A878" stroke-width="18" stroke-linejoin="miter"/>
  
  <!-- R Stem -->
  <rect x="50" y="55" width="22" height="90" fill="#40A878"/>
  
  <!-- R Loop -->
  <path d="M 72,55 L 110,55 A 22,22 0 0 1 132,77 A 22,22 0 0 1 110,100 L 72,100 Z" fill="#40A878"/>
  <path d="M 72,73 L 110,73 A 4,4 0 0 1 114,77 A 4,4 0 0 1 110,82 L 72,82 Z" fill="#ffffff"/> <!-- Cutout for R loop -->
  
  <!-- R Leg -->
  <polygon points="90,100 115,100 140,145 115,145" fill="#40A878"/>
  
  <!-- G Shape -->
  <path d="M 150,75 A 22,22 0 0 0 110,55 L 110,75 A 4,4 0 0 1 132,77 L 150,75 Z" fill="#40A878"/>
  <path d="M 150,125 A 22,22 0 0 1 110,145 L 72,145 L 72,125 L 110,125 A 4,4 0 0 0 132,123 L 150,125 Z" fill="#40A878"/>
  <rect x="132" y="75" width="18" height="50" fill="#40A878"/>
  <rect x="110" y="105" width="40" height="18" fill="#40A878"/>
</svg>
